apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          env:
            # FIX: Tell Nginx the exact name of the Kubernetes service
            - name: BACKEND_HOST
              value: {{ .Release.Name }}-backend
          ports:
            - containerPort: 80