apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multi-tier-app
  namespace: argocd
spec:
  project: default
  source:
    # IMPORTANT: Replace this with your actual GitHub repository URL
    repoURL: 'https://github.com/Ravindra-Reddy27/gke-multiregion-application.git' 
    targetRevision: HEAD
    path: charts/my-app # The path to your Helm chart.
  destination:
    server: 'https://kubernetes.default.svc' # Deploys to the cluster ArgoCD is running on
    namespace: default
  syncPolicy:
    automated: # This enables the GitOps magic! ArgoCD will automatically sync changes [cite: 188]
      prune: true
      selfHeal: true